name: Feature request
description: Propose a new capability or improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve
      description: Describe the user problem first. The solution is secondary.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: How you think it should work. Rough is fine.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem, and why you ruled them out.
  - type: checkboxes
    id: script
    attributes:
      label: Can this be a script instead of code?
      description: Most new capabilities in Mesh are scripts in the marketplace, not changes to the control plane.
      options:
        - label: I have considered whether this fits as a marketplace script.
          required: true
